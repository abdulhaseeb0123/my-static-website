<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignIn/SignUp</title>

<style>
   body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4e73df, #1cc88a);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    max-width: 100%;
}

.login-box {
    width: 320px;
    padding: 30px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: 0.3s;
    max-width: 100%;
}

.login-box:hover {
    transform: translateY(-5px);
    max-width: 100%;
}

.login-box h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #4e73df;
    max-width: 100%;
}

.login-box label {
    font-size: 14px;
    margin-top: 10px;
    display: block;
    max-width: 100%;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    transition: 0.3s;
    max-width: 100%;
}

.login-box input:focus {
    border-color: #4e73df;
    box-shadow: 0 0 8px rgba(78,115,223,0.4);
    outline: none;
    max-width: 100%;
}

.login-box button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: linear-gradient(45deg, #4e73df, #1cc88a);
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    max-width: 100%;
}

.login-box button:hover {
    opacity: 0.9;
    transform: scale(1.05);
    max-width: 100%;
}

.submit{
     display: inline-block;
    padding: 10px 10px;
    margin: 5px;
    background-color: #007BFF;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
    border: 2px solid #007BFF;
    transition: all 0.3s ease;
    max-width: 100%;
}
.submit:hover{
    background-color: white;
color: #007BFF;
border: 2p solid #007BFF;
max-width: 100%;
}




.back{
     display: inline-block;
    padding: 10px 10px;
    margin: 5px;
    background-color: #007BFF;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
    border: 2px solid #007BFF;
    transition: all 0.3s ease;
    bottom: 30px;
    max-width: 100%;
}
.back:hover {
    background-color: white;
color: #007BFF;
border: 2p solid #007BFF;
max-width: 100%;
}


/* media query */

@media (max-width: 768px) {

    body {
        padding: 10px;
    }

    .container,
    .hero,
    .card,
    nav {
        width: 100%;
    }

    .hero {
        flex-direction: column;
        text-align: center;
    }

    img {
        max-width: 100%;
        height: auto;
    }

    h1 {
        font-size: 26px;
    }

    p {
        font-size: 14px;
    }

    a, button {
        display: inline-block;
        margin-top: 10px;
    }
}
</style>


</head>
<body>
    
<div class="login-box">
    <h2>Login</h2>

    <form action="post">
    <label for="username">
        Enter your Username
    </label>
    <input type="text" name="Username" id="username" placeholder="Username"><br><br>
    <label for="Password">
        Enter Your Password
    </label>
    <input type="password" name="Password" id="Password" placeholder="Password">
   
    <input class="submit" type="submit" value="Submit"><br><hr>

<div class="back">
    <a href="index.html">Back To HomePage</a>
</div>

</div>
</form>








</body>
</html>
